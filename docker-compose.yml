version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"     # Tailscale network only
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - N8N_LOG_LEVEL=info
      - N8N_DIAGNOSTICS_ENABLED=false
      - WEBHOOK_URL=http://localhost:5678/
      # FAS integration environment variables
      - GATEWAY_URL=${GATEWAY_URL:-http://host.docker.internal:3100}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - CLAUDE_DAILY_LIMIT=${CLAUDE_DAILY_LIMIT:-1000}
      - GEMINI_DAILY_LIMIT=${GEMINI_DAILY_LIMIT:-500}
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount project directories for task file access
      - ./tasks:/data/tasks
      - ./state:/data/state
      - ./reports:/data/reports
      - ./config:/data/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data:
    driver: local
