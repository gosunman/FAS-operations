rules:
  low:
    actions:
      - file_read
      - web_search
      - code_analysis
      - report_generation
      - test_execution
      - log_review
      - crawling
    approval: auto
    log: true

  mid:
    actions:
      - file_write
      - git_commit
      - code_generation
      - config_change
      - internal_api_call
      - slack_message
      - notion_page_create
    approval: ai_cross_review
    reviewer: gemini_a
    timeout_minutes: 10
    log: true

  high:
    actions:
      - git_push
      - pr_creation
      - external_api_call
      - docker_operation
      - system_config
      - package_install
      - telegram_alert
    approval: human
    timeout_minutes: 30
    on_timeout: safe_mode
    log: true

  critical:
    actions:
      - deploy
      - data_deletion
      - account_action
      - secret_access
      - financial_action
    approval: human_required
    timeout_minutes: null
    on_timeout: reject
    log: true
