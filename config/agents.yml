# Source of truth for agent identities/roles: docs/agents-charter.md

agents:
  claude:
    display_name: "Claude Code (Max) — Captain"
    identity: "주인님의 뇌 🧠 — 판단, 전략, 오케스트레이션"
    device: captain
    account: A                        # owner's account
    autonomy: medium                  # follows defined workflows
    tmux_session: cc-fas
    execution_mode: interactive       # oneshot | interactive
    capabilities:
      - code_generation
      - code_review
      - file_write
      - git_commit
      - git_push
      - documentation
      - architecture_design
      - test_writing
      - textbook_generation
      - test_paper_generation
      - parent_message_draft
      - idea_analysis
      - project_documentation
    max_concurrent_tasks: 1
    allowed_modes: [sleep, awake]
    priority_weight: 10
    can_access_personal_info: true
    restart_policy:
      max_retries: 3
      retry_delay_seconds: 5
      escalate_after: 3

  gemini_a:
    display_name: "Gemini CLI (Research) — Captain"
    identity: "캡틴의 리서치 도구"
    device: captain
    account: A
    autonomy: medium
    tmux_session: fas-gemini-a
    execution_mode: oneshot
    capabilities:
      - web_search
      - research
      - trend_analysis
      - fact_checking
      - cross_validation
      - code_review
      - report_review
      - crawling
      - job_search
      - startup_program_search
      - market_analysis
    max_concurrent_tasks: 2
    allowed_modes: [sleep, awake, recurring]
    priority_weight: 7
    can_access_personal_info: true
    restart_policy:
      max_retries: 3
      retry_delay_seconds: 5
      escalate_after: 3

  openclaw:
    display_name: "OpenClaw (ChatGPT) — Hunter Engine"
    identity: "주인님의 눈 👁️ — 정보 탐색, 크롤링, 리서치 (main browser engine)"
    device: hunter
    account: B                        # hunter-dedicated isolated account
    autonomy: high                    # proactively reads owner's intent
    tmux_session: fas-openclaw
    execution_mode: oneshot
    communication: task_api           # task_api (직접 제어 아님)
    # Plan tier: Stage 1 → Plus ($20), Stage 3 → Pro ($200)
    capabilities:
      - autonomous_browsing
      - web_automation
      - crawl_code_generation
      - notebooklm_verification
      - deep_research_execution
      - abstract_task_execution
      - trend_exploration
      - vague_task_interpretation
    max_concurrent_tasks: 1
    allowed_modes: [sleep, awake, recurring]
    priority_weight: 8
    can_access_personal_info: false   # 절대 개인정보 접근 금지
    report_to:
      non_critical: captain           # via Task API
      critical: owner                 # via Telegram/Slack directly
    restart_policy:
      max_retries: 3
      retry_delay_seconds: 10
      escalate_after: 3

  # claude_hunter 제거 — Claude Code는 핸드폰 인증 필수라 헌터 계정 B로 사용 불가
  # 대체: 브라우저 작업 → OpenClaw(ChatGPT), 코딩/지능 작업 → Gemini CLI
