# FAS Thunderbolt Bridge Firewall — Hunter (169.254.1.2)
# Doctrine: hunter cannot initiate any connection

tb_if = "bridge0"
captain_ip = "169.254.1.1"
hunter_ip = "169.254.1.2"
jaccl_data  = "51000:51007"
jaccl_coord = "51100"

block drop log on $tb_if all

pass in quick on $tb_if proto tcp \
    from $captain_ip to $hunter_ip \
    port $jaccl_coord \
    flags S/SA keep state

pass in quick on $tb_if proto tcp \
    from $captain_ip to $hunter_ip \
    port $jaccl_data \
    flags S/SA keep state

pass in quick on $tb_if proto icmp \
    from $captain_ip to $hunter_ip \
    icmp-type echoreq keep state

block drop log on $tb_if from $hunter_ip to any
