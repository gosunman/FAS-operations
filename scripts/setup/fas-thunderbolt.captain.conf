# FAS Thunderbolt Bridge Firewall — Captain (169.254.1.1)
# Doctrine: captain->hunter unidirectional + JACCL ports only

tb_if = "bridge0"
hunter_ip = "169.254.1.2"
captain_ip = "169.254.1.1"
jaccl_data  = "51000:51007"
jaccl_coord = "51100"

block drop log on $tb_if all

pass out quick on $tb_if proto tcp \
    from $captain_ip to $hunter_ip \
    port $jaccl_coord \
    flags S/SA keep state

pass out quick on $tb_if proto tcp \
    from $captain_ip to $hunter_ip \
    port $jaccl_data \
    flags S/SA keep state

pass out quick on $tb_if proto icmp \
    from $captain_ip to $hunter_ip \
    icmp-type echoreq keep state

block drop log on $tb_if from $hunter_ip to $captain_ip
