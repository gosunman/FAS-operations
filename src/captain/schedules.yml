# Captain Planning Loop — Schedule Definitions
# Consumed by planning_loop.ts to create tasks on a recurring basis.
#
# Schedule types:
#   daily        — runs every day
#   every_3_days — runs every 3 days from epoch (2026-01-01)
#   weekly       — runs on a specific day of the week
#
# Fields:
#   title       — human-readable task title (must be unique for dedup)
#   type        — schedule type (daily | every_3_days | weekly)
#   time        — preferred execution time (HH:MM, informational only)
#   day         — day of week for weekly schedules (monday, tuesday, ...)
#   mode        — FAS mode (awake | sleep | recurring)
#   agent       — assigned agent (gemini_a, claude, hunter). Omit for system workflows.
#   action      — action type (web_crawl, research, chatgpt_task, generate_test, etc.)
#   risk_level  — LOW | MID | HIGH | CRITICAL
#   requires_personal_info — whether task needs PII access (true/false)
#   workflow    — system workflow ID (for non-task schedules)
#   description — task description text

schedules:
  # === Daily schedules ===

  ai_trends:
    title: "AI 트렌드 리서치"
    type: daily
    time: "01:00"
    mode: sleep
    agent: gemini_a
    action: research
    risk_level: low
    requires_personal_info: false
    description: "AI/ML 최신 트렌드, 논문, 제품 출시 동향을 리서치하고 요약"

